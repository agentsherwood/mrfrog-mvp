<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mr. Frog World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Shadows+Into+Light&family=Gloria+Hallelujah&family=Architects+Daughter&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #fdf6e3;
    --paper-warm: #f4e8c8;
    --ink: #1a3a5c;
    --ink-soft: #2d4a6b;
    --pencil: #3a3a3a;
    --red-margin: #d94c4c;
    --rule: #a8c4e0;
    --wash-green: #9cc38a;
    --wash-pink: #f2b3b3;
    --wash-yellow: #f2dc7e;
    --wash-purple: #c8a8d4;
    --wash-blue: #a8c4e0;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }

  body {
    background: #2a241c;
    font-family: 'Caveat', cursive;
    color: var(--ink);
  }

  /* Stage (app layout) */
  .app {
    position: fixed; inset: 0;
    display: grid;
    grid-template-columns: 230px 1fr;
    background: radial-gradient(ellipse at center, #3d3528 0%, #1c1812 100%);
    padding: 20px;
    gap: 0;
  }

  .app::before {
    content: "";
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 6px);
    pointer-events: none;
  }

  /* ================== SIDEBAR ================== */
  .sidebar {
    position: relative;
    background: var(--paper);
    padding: 28px 22px 28px 26px;
    display: flex; flex-direction: column;
    overflow: hidden;
    z-index: 2;
    border-radius: 4px 0 0 4px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6), 0 10px 30px -10px rgba(0,0,0,0.4);
  }
  .sidebar::before {
    /* Warm wash matching page */
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(255,240,200,0.5), transparent 60%),
      radial-gradient(ellipse at 0% 100%, rgba(210,170,110,0.18), transparent 55%);
    pointer-events: none;
  }
  .sidebar::after {
    /* Spiral binding gutter at the seam */
    content: "";
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: 22px;
    background:
      linear-gradient(to right, transparent 0%, rgba(0,0,0,0.08) 60%, rgba(0,0,0,0.18) 100%),
      repeating-linear-gradient(to bottom, transparent 0 26px, rgba(26,58,92,0.55) 26px 28px, transparent 28px 52px);
    z-index: 3;
    pointer-events: none;
  }

  .brand {
    font-family: 'Gloria Hallelujah', cursive;
    font-size: 26px;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 2px;
    transform: rotate(-2deg);
    position: relative; z-index: 3;
  }
  .brand small {
    display: block;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--pencil);
    margin-top: 4px;
    transform: rotate(1deg);
  }
  .brand-rule {
    border: none;
    border-top: 1.5px dashed var(--red-margin);
    margin: 16px 2px 12px 0;
    position: relative; z-index: 3;
  }

  .nav-list {
    display: flex; flex-direction: column;
    gap: 4px;
    position: relative; z-index: 3;
  }
  .nav-item {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--ink);
    background: transparent;
    border: 1.8px solid transparent;
    border-radius: 14px 4px 16px 4px;
    padding: 6px 14px 6px 12px;
    text-align: left;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s, transform 0.15s, border-color 0.15s;
    position: relative;
    width: 100%;
  }
  .nav-item .idx {
    display: inline-block;
    font-family: 'Gloria Hallelujah', cursive;
    font-size: 14px;
    color: var(--red-margin);
    min-width: 18px;
  }
  .nav-item:hover {
    background: rgba(242,220,126,0.5);
    transform: translateX(2px);
  }
  .nav-item.active {
    background: var(--wash-yellow);
    border-color: var(--ink);
    box-shadow: 2px 2px 0 rgba(26,58,92,0.25);
    transform: translateX(2px);
  }
  .nav-item.active::after {
    content: "✎";
    margin-left: auto;
    color: var(--red-margin);
    font-size: 18px;
  }

  .nav-divider {
    border: none;
    border-top: 1px solid rgba(26,58,92,0.25);
    margin: 14px 2px 8px 0;
    position: relative; z-index: 3;
  }
  .nav-label {
    font-family: 'Caveat', cursive;
    font-size: 15px;
    color: var(--pencil);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin: 8px 0 4px 4px;
    opacity: 0.7;
    position: relative; z-index: 3;
  }

  .sidebar-footer {
    margin-top: auto;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--pencil);
    opacity: 0.7;
    position: relative; z-index: 3;
    padding-right: 14px;
  }

  /* Doodle on sidebar */
  .sidebar-doodle {
    position: relative;
    margin: 18px auto 8px;
    width: 90px;
    z-index: 3;
    transform: rotate(-6deg);
  }

  /* ================== PAGE AREA ================== */
  .page-stage {
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }

  .page {
    position: relative;
    width: 100%; height: 100%;
    background: var(--paper);
    border-radius: 0 14px 14px 0;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      0 10px 30px -10px rgba(0,0,0,0.4),
      inset 0 0 80px rgba(120,90,40,0.08),
      inset 22px 0 28px -12px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* Paper texture */
  .page::before {
    content: "";
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.2  0 0 0 0.1 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.5;
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 1;
  }

  /* Warm wash */
  .page::after {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(255,240,200,0.5), transparent 60%),
      radial-gradient(ellipse at 90% 100%, rgba(210,170,110,0.18), transparent 55%);
    pointer-events: none;
    z-index: 2;
  }

  /* Central seam / binding — appears on every page */
  .page .seam {
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 44px;
    transform: translateX(-50%);
    z-index: 6;
    pointer-events: none;
    background:
      linear-gradient(to right,
        transparent 0%,
        rgba(0,0,0,0.12) 35%,
        rgba(0,0,0,0.22) 50%,
        rgba(0,0,0,0.12) 65%,
        transparent 100%),
      radial-gradient(ellipse at center, rgba(60,40,20,0.08), transparent 70%);
  }
  .page .seam::before {
    /* The fold line */
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    background: rgba(60,40,20,0.35);
    transform: translateX(-50%);
  }
  .page .seam::after {
    /* Faint stitched pattern */
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 2px;
    transform: translateX(-50%);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0 10px,
      rgba(60,40,20,0.18) 10px 14px,
      transparent 14px 22px);
    opacity: 0.55;
  }

  /* Spread: two halves separated by the seam */
  .spread {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    z-index: 4;
  }
  .half {
    position: relative;
    overflow: hidden;
  }
  .half.left  { padding: 48px 56px 48px 96px; }
  .half.right { padding: 48px 96px 48px 56px; }

  /* Full-bleed content that crosses the seam */
  .spread.single {
    grid-template-columns: 1fr;
    padding: 48px 64px;
  }

  /* Mirrored red margins */
  .half.left  .margin-line-h {
    position: absolute;
    left: 80px; top: 0; bottom: 0;
    width: 1.5px;
    background: var(--red-margin);
    opacity: 0.5;
    z-index: 1;
  }
  .half.right .margin-line-h {
    position: absolute;
    right: 80px; top: 0; bottom: 0;
    width: 1.5px;
    background: var(--red-margin);
    opacity: 0.5;
    z-index: 1;
  }

  /* Mirrored punch holes */
  .half .holes-h {
    position: absolute;
    top: 0; bottom: 0;
    width: 30px;
    display: flex; flex-direction: column; justify-content: space-around;
    padding: 50px 0;
    pointer-events: none;
    z-index: 1;
  }
  .half.left  .holes-h { left: 22px; }
  .half.right .holes-h { right: 22px; }
  .half .holes-h .hole {
    width: 18px; height: 18px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #1a1812, #000);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.9), 1px 1px 0 rgba(255,255,255,0.35);
  }

  /* Ruled spread — ruling draws on the halves */
  .page.ruled .half::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0 32px, var(--rule) 32px 33px);
    pointer-events: none;
    z-index: 0;
  }

  /* Page corner markers */
  .page-num-h {
    position: absolute;
    top: 22px;
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--pencil);
    transform: rotate(-4deg);
    z-index: 5; opacity: 0.65;
  }
  .half.left  .page-num-h { left: 30px; }
  .half.right .page-num-h { right: 30px; transform: rotate(3deg); }

  .date-stamp-h {
    position: absolute;
    top: 22px;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--pencil);
    opacity: 0.7;
    z-index: 5;
    max-width: 40%;
  }
  .half.left .date-stamp-h  { right: 20px; transform: rotate(3deg); text-align: right; }
  .half.right .date-stamp-h { left: 20px;  transform: rotate(-2deg); }

  /* Inner content shell per half */
  .half-inner {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  /* Ruled */
  .page.ruled {
    background:
      repeating-linear-gradient(to bottom, transparent 0 32px, var(--rule) 32px 33px),
      var(--paper);
  }

  /* Red margin */
  .page .margin-line {
    position: absolute;
    left: 80px; top: 0; bottom: 0;
    width: 1.5px;
    background: var(--red-margin);
    opacity: 0.55;
    z-index: 3;
    box-shadow: 1px 0 0 rgba(217,76,76,0.2);
  }

  /* Holes */
  .holes {
    position: absolute;
    left: 20px; top: 0; bottom: 0;
    width: 30px;
    z-index: 3;
    display: flex; flex-direction: column; justify-content: space-around;
    padding: 50px 0;
    pointer-events: none;
  }
  .holes .hole {
    width: 20px; height: 20px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #1a1812, #000);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.9), 1px 1px 0 rgba(255,255,255,0.4);
  }

  .content {
    position: absolute;
    inset: 0;
    padding: 42px 50px 42px 110px;
    z-index: 4;
    overflow: hidden;
  }

  .page-num {
    position: absolute;
    top: 22px; left: 30px;
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--pencil);
    transform: rotate(-4deg);
    z-index: 5; opacity: 0.6;
  }
  .date-stamp {
    position: absolute;
    top: 22px; right: 32px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--pencil);
    transform: rotate(3deg);
    opacity: 0.75;
    z-index: 5;
  }
  .date-stamp::before { content: "~ "; }

  .corner-curl {
    position: absolute; bottom: 0; right: 0;
    width: 46px; height: 46px;
    background: linear-gradient(135deg, transparent 50%, rgba(180,150,100,0.3) 52%, rgba(120,95,55,0.35) 100%);
    border-bottom-right-radius: 14px;
    z-index: 3;
    pointer-events: none;
  }

  .page-title {
    font-family: 'Gloria Hallelujah', cursive;
    font-size: 32px;
    color: var(--ink);
    margin: 0 0 2px;
    line-height: 1;
    transform: rotate(-1deg);
    display: inline-block;
    max-width: 75%;
  }
  .page-subtitle {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--pencil);
    margin: 0;
    transform: rotate(0.3deg);
    display: block;
  }

  .title-scribble svg { width: 300px; height: 10px; display: block; margin-top: -2px; }

  /* ================== HOME / COVER ================== */
  .home-wrap {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 20px;
    height: 100%;
    align-items: center;
  }
  .home-left {
    display: flex; flex-direction: column; justify-content: center;
    gap: 6px;
  }
  .kicker {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--pencil);
    transform: rotate(-2deg);
  }
  .home-title {
    font-family: 'Gloria Hallelujah', cursive;
    font-size: clamp(32px, 3.4vw, 48px);
    color: var(--ink);
    line-height: 0.98;
    letter-spacing: -0.5px;
  }
  .home-title .amp {
    color: var(--red-margin);
    font-family: 'Caveat', cursive;
    font-size: 0.65em;
    display: inline-block;
    transform: rotate(8deg);
  }
  .home-title .w1 { display: inline-block; transform: rotate(-2deg); }
  .home-title .w2 { display: inline-block; transform: rotate(1.5deg); }
  .home-byline {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--pencil);
    transform: rotate(-1.5deg);
    margin-top: 6px;
  }
  .home-byline .name {
    color: var(--ink);
    font-weight: 600;
    border-bottom: 2px solid var(--red-margin);
    padding-bottom: 2px;
  }

  .underline-scribble { width: 300px; height: 12px; display: block; margin-top: -4px; }

  .home-right {
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .home-frog {
    width: min(320px, 36vw);
    transform: rotate(-4deg);
    transition: transform 0.3s;
  }
  .home-frog:hover { transform: rotate(-4deg) scale(1.04); }
  .home-frog.bounce { animation: bounce 0.6s; }
  @keyframes bounce {
    0%, 100% { transform: rotate(-4deg) translateY(0) scale(1); }
    30% { transform: rotate(-4deg) translateY(-30px) scale(1.05); }
    60% { transform: rotate(-4deg) translateY(10px) scale(0.95, 1.08); }
  }

  .home-toc {
    margin-top: 14px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--ink);
    line-height: 1.35;
  }
  .home-toc ul { padding-left: 0; list-style: none; margin: 6px 0 0 0; }
  .home-toc li {
    margin-bottom: 4px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .home-toc .bullet {
    color: var(--red-margin);
    flex-shrink: 0;
  }
  .home-toc .go { flex: 1; text-align: left; }
  .home-toc .go {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: inherit;
    color: var(--ink);
    text-decoration: none;
    padding: 0;
    text-align: left;
  }
  .home-toc .go:hover {
    text-decoration: underline wavy var(--red-margin);
    text-underline-offset: 4px;
    color: var(--red-margin);
  }
  .home-toc .go-unused {
    font-family: inherit;
    font-size: inherit;
    color: var(--ink);
    text-decoration: underline wavy var(--red-margin);
    text-underline-offset: 4px;
    padding: 0;
  }
  .home-toc .go:hover { color: var(--red-margin); }

  /* ================== GALLERY (comic strip) ================== */
  .comic-strip {
    flex: 1 1 auto;
    display: grid;
    grid-template-rows: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 6px;
    min-height: 360px;
  }
  .panel {
    position: relative;
    background: #fffbe8;
    border: 2.5px solid var(--ink);
    border-radius: 4px;
    box-shadow: 3px 4px 0 rgba(26,58,92,0.18), inset 0 0 30px rgba(180,140,80,0.08);
    overflow: hidden;
    min-height: 0;
  }
  .panel:nth-child(odd)  { transform: rotate(-0.6deg); }
  .panel:nth-child(even) { transform: rotate(0.5deg); }
  .panel .panel-num {
    position: absolute;
    top: 4px; left: 6px;
    width: 24px; height: 24px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Gloria Hallelujah', cursive;
    font-size: 14px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 4;
    transform: rotate(-6deg);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.25);
  }
  .panel .panel-cap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,247,224,0.95);
    border-top: 1.5px solid var(--ink);
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--ink);
    padding: 3px 10px;
    line-height: 1.15;
    z-index: 3;
  }
  .panel .panel-stage {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  /* Wide panel spans 2 rows */
  .panel.wide { grid-row: span 2; }
  .panel.tall-row { grid-row: span 1; }

  /* Comic speech bubbles */
  .bubble {
    position: absolute;
    background: #fff;
    border: 2px solid var(--ink);
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--ink);
    padding: 4px 12px;
    border-radius: 18px;
    z-index: 5;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    max-width: 65%;
    line-height: 1.15;
  }
  .bubble.shout {
    border-radius: 4px;
    border-width: 2.5px;
    transform: rotate(-3deg);
    font-family: 'Gloria Hallelujah', cursive;
    background: #fff7c2;
  }
  .bubble.think {
    border-style: dashed;
    background: #f4f0e0;
  }
  .bubble .tail {
    position: absolute;
    width: 10px; height: 10px;
    background: #fff;
    border-right: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }
  .bubble.shout .tail { background: #fff7c2; }
  .bubble.think .tail { background: #f4f0e0; border-style: dashed; }
  .bubble .tail.bl { bottom: -7px; left: 16px; transform: rotate(45deg); }
  .bubble .tail.br { bottom: -7px; right: 16px; transform: rotate(45deg); }
  .bubble .tail.tl { top: -7px; left: 16px;    transform: rotate(225deg); }

  /* SFX text */
  .sfx {
    position: absolute;
    font-family: 'Gloria Hallelujah', cursive;
    font-weight: 700;
    color: var(--red-margin);
    -webkit-text-stroke: 1.5px var(--ink);
    text-stroke: 1.5px var(--ink);
    z-index: 5;
    pointer-events: none;
    letter-spacing: 1px;
  }

  /* Action lines */
  .action-lines {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ================== GALLERY (legacy outfit grid — kept for safety) ================== */
  .gallery-grid-legacy {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 14px 16px;
    flex: 1;
    min-height: 0;
    margin-top: 10px;
  }
  .gallery-wrap {
    display: flex; flex-direction: column;
    height: 100%;
  }
  .outfit-card {
    position: relative;
    border: 2px solid var(--ink);
    border-radius: 4px;
    background: #fff7e0;
    padding: 6px 6px 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 2px 3px 0 rgba(26,58,92,0.12);
    transition: transform 0.3s;
    overflow: hidden;
    min-height: 0;
  }
  .outfit-card:nth-child(1) { transform: rotate(-1.5deg); }
  .outfit-card:nth-child(2) { transform: rotate(0.8deg); }
  .outfit-card:nth-child(3) { transform: rotate(-0.6deg); }
  .outfit-card:nth-child(4) { transform: rotate(1.2deg); }
  .outfit-card:hover {
    transform: rotate(0deg) scale(1.04) !important;
    z-index: 5;
    box-shadow: 4px 6px 0 rgba(26,58,92,0.2);
  }
  .outfit-card svg { width: 100%; height: 100%; display: block; max-height: calc(100% - 6px); }
  .outfit-caption {
    position: absolute;
    bottom: 4px; left: 0; right: 0;
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 18px; line-height: 1.1;
    color: var(--ink);
  }
  .outfit-caption .stars { color: var(--red-margin); }
  .tape {
    position: absolute;
    width: 52px; height: 16px;

<script>
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function ribbit() {
    const ctx = ensureAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    for (let i = 0; i < 2; i++) {
      const t0 = now + i * 0.13;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 900;
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(110 + i*15, t0);
      osc.frequency.exponentialRampToValueAtTime(70 + i*10, t0 + 0.1);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(0.28, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.11);
      osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + 0.12);
    }
  }
  function popSound() {
    const ctx = ensureAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(1400, now + 0.08);
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.11);
  }
  function pageFlipSound() {
    const ctx = ensureAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ctx.sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 8) * 0.28;
    }
    const src = ctx.createBufferSource(); src.buffer = buffer;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 2200;
    src.connect(filt); filt.connect(ctx.destination);
    src.start(now);
  }
</script>

                <div style="position:absolute; top:18%; right:18%; transform: rotate(8deg);">${flySVG(70, false)}</div>

function field(label, key, inner, hint) {
  return `
    <div class="field">
      <div class="field-label">${label} ${hint ? `<span class="hint">${hint}</span>` : ''}</div>
      <div class="chip-row">${inner}</div>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function moodLabel(m) {
  const f = MOODS.find(x => x.key === m);
  return f ? f.label : m;
}

<!-- =============== APP / NAV =============== -->
<script>
const pageStage = document.getElementById('pageStage');
const navList = document.getElementById('navList');

function renderNav() {
  navList.innerHTML = PAGES.map((p, i) => `
    <button class="nav-item ${state.page === p.id ? 'active' : ''}" data-nav="${p.id}">
      <span class="idx">${i+1}.</span>${p.label}
    </button>
  `).join('');
  navList.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.nav));
  });
}

function renderPage() {
  let html;
  switch (state.page) {
    case 'home':    html = renderHome(); break;
    case 'gallery': html = renderGallery(); break;
    case 'frogs':   html = renderFrogs(); break;
    case 'house':   html = renderHouse(); break;
    case 'edit':    html = renderEdit(); break;
    default:        html = renderHome();
  }
  pageStage.innerHTML = html;
  pageStage.firstElementChild?.setAttribute('data-screen-label', `0${PAGES.findIndex(p=>p.id===state.page)+1 || 5} ${state.page}`);
  attachHandlers();
  notifySlide();
}

function navigate(id) {
  if (state.page === id) return;
  state.page = id;
  localStorage.setItem('mrfrog_page_v2', id);
  renderNav();
  renderPage();
}

function navigateToEdit(frogId) {
  state.editingId = frogId;
  state.page = 'edit';
  renderNav();
  renderPage();
}

// Slide idx notify
function notifySlide() {
  const idx = PAGES.findIndex(p => p.id === state.page);
  window.parent.postMessage({ slideIndexChanged: idx >= 0 ? idx : 0 }, '*');
}

// ========= HANDLERS =========
function attachHandlers() {
  // Stickers
  document.querySelectorAll('.sticker').forEach(st => {
    let startX, startY, originX, originY, dragging = false;
    const getPos = () => {
      const rect = st.getBoundingClientRect();
      const parent = st.offsetParent.getBoundingClientRect();
      return { x: rect.left - parent.left, y: rect.top - parent.top };
    };
    const onDown = (e) => {
      e.preventDefault();
      dragging = true;
      st.classList.add('dragging');
      const point = e.touches ? e.touches[0] : e;
      startX = point.clientX; startY = point.clientY;
      const p = getPos();
      originX = p.x; originY = p.y;
      st.style.top = originY + 'px';
      st.style.left = originX + 'px';
      st.style.right = 'auto';
      st.style.bottom = 'auto';
      popSound();
    };
    const onMove = (e) => {
      if (!dragging) return;
      const point = e.touches ? e.touches[0] : e;
      const dx = point.clientX - startX;
      const dy = point.clientY - startY;
      st.style.left = (originX + dx) + 'px';
      st.style.top = (originY + dy) + 'px';
    };
    const onUp = () => {
      if (!dragging) return;
      dragging = false;
      st.classList.remove('dragging');
    };
    st.addEventListener('mousedown', onDown);
    st.addEventListener('touchstart', onDown, { passive: false });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);
  });

  // Home TOC
  document.querySelectorAll('[data-go]').forEach(b => {
    b.addEventListener('click', () => navigate(b.dataset.go));
  });

  // Home cover frog click
  const coverFrog = document.getElementById('coverFrog');
  if (coverFrog) {
    coverFrog.addEventListener('click', (e) => {
      ribbit();
      coverFrog.classList.remove('bounce');
      void coverFrog.offsetWidth;
      coverFrog.classList.add('bounce');
      spawnRibbitText(e.clientX, e.clientY);
    });
  }

  // Easter egg on home
  document.querySelectorAll('.egg-spot').forEach(egg => {
    egg.addEventListener('click', spawnFly);
  });

  // Scene frog
  const sceneFrog = document.getElementById('sceneFrogGroup');
  if (sceneFrog) {
    sceneFrog.addEventListener('click', (e) => {
      ribbit();
      spawnRibbitText(e.clientX, e.clientY);
    });
  }

  // Frog cards -> open edit
  document.querySelectorAll('.frog-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = parseInt(card.dataset.frogId, 10);
      popSound();
      navigateToEdit(id);
    });
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        const id = parseInt(card.dataset.frogId, 10);
        navigateToEdit(id);
      }
    });
  });

  // Outfit cards ribbit
  document.querySelectorAll('.outfit-card').forEach(card => {
    card.addEventListener('click', (e) => {
      ribbit();
      spawnRibbitText(e.clientX, e.clientY);
    });
  });

  // Edit page handlers
  if (state.page === 'edit') attachEditHandlers();
}

function attachEditHandlers() {
  const frog = getFrog(state.editingId);
  if (!frog) return;

  document.getElementById('backBtn').addEventListener('click', () => navigate('frogs'));

  // Chips
  document.querySelectorAll('#editFields .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const f = chip.dataset.field;
      const v = chip.dataset.val;
      const multi = chip.dataset.multi;
      if (multi) {
        const set = new Set(frog.likes);
        if (set.has(v)) set.delete(v); else set.add(v);
        frog.likes = Array.from(set);
        chip.classList.toggle('active');
      } else {
        frog[f] = v;
        document.querySelectorAll(`#editFields .chip[data-field="${f}"]`).forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      }
      saveFrogs();
      updateEditPreview();
      popSound();
    });
  });

  // Name input
  const nameInput = document.getElementById('nameInput');
  nameInput.addEventListener('input', () => {
    frog.name = nameInput.value;
    saveFrogs();
  });

  // Notes
  const notesInput = document.getElementById('notesInput');
  notesInput.addEventListener('input', () => {
    frog.notes = notesInput.value;
    saveFrogs();
  });

  // Stars
  document.querySelectorAll('#starsInput .star-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const n = parseInt(btn.dataset.star, 10);
      frog.stars = n;
      document.querySelectorAll('#starsInput .star-btn').forEach(b => {
        const bn = parseInt(b.dataset.star, 10);
        b.classList.toggle('on', bn <= n);
      });
      saveFrogs();
      popSound();
    });
  });
}

function updateEditPreview() {
  const frog = getFrog(state.editingId);
  if (!frog) return;
  document.getElementById('editPreview').innerHTML = frogSVG(frog, { size: 260 });
}

// ========= FX =========
function spawnRibbitText(x, y) {
  const words = ['ribbit!', 'RIBBIT', 'croak!', 'rib-rib!', '♪ ribbit ♪'];
  const el = document.createElement('div');
  el.className = 'ribbit-pop';
  el.textContent = words[Math.floor(Math.random() * words.length)];
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function spawnFly() {
  if (document.querySelector('.fly')) return;
  const fly = document.createElement('div');
  fly.className = 'fly';
  fly.innerHTML = `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
    <ellipse cx="20" cy="22" rx="6" ry="8" fill="#1a3a5c" stroke="#1a3a5c" stroke-width="1.5"/>
    <circle cx="17" cy="18" r="1.5" fill="#fffbe8"/>
    <circle cx="23" cy="18" r="1.5" fill="#fffbe8"/>
    <ellipse cx="13" cy="20" rx="5" ry="7" fill="#a8c4e0" opacity="0.6" stroke="#1a3a5c" stroke-width="1"/>
    <ellipse cx="27" cy="20" rx="5" ry="7" fill="#a8c4e0" opacity="0.6" stroke="#1a3a5c" stroke-width="1"/>
  </svg>`;
  document.body.appendChild(fly);
  let t = 0;
  let cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  let tx = cx, ty = cy;
  function tick() {
    if (!fly.isConnected) return;
    t += 0.02;
    if (Math.random() < 0.02) {
      tx = 120 + Math.random() * (window.innerWidth - 200);
      ty = 80 + Math.random() * (window.innerHeight - 160);
    }
    cx += (tx - cx) * 0.03 + Math.sin(t * 15) * 2;
    cy += (ty - cy) * 0.03 + Math.cos(t * 12) * 2;
    fly.style.left = cx + 'px';
    fly.style.top = cy + 'px';
    requestAnimationFrame(tick);
  }
  tick();
  fly.addEventListener('click', () => {
    ribbit();
    const caught = document.createElement('div');
    caught.className = 'ribbit-pop';
    caught.textContent = 'GOT IT!';
    caught.style.left = fly.style.left;
    caught.style.top = fly.style.top;
    caught.style.color = '#d94c4c';
    document.body.appendChild(caught);
    setTimeout(() => caught.remove(), 1000);
    fly.remove();
  });
}

// Hide hint
setTimeout(() => {
  const h = document.getElementById('hint');
  if (h) { h.classList.add('fade'); setTimeout(() => h.remove(), 700); }
}, 6500);

// Init
renderNav();
renderPage();
document.addEventListener('click', () => ensureAudio(), { once: true });
</script>
